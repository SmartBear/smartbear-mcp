name: Registry — Remove Remote URL

# Removes a remotes[].url entry from published versions of a server in the
# official MCP registry, without deleting the versions (history is preserved).
#
# Primary use: freeing a remote URL that is still claimed by old versions of
# one server so it can be re-published under a new server in the same namespace
# (the registry's validateNoDuplicateRemoteURLs rejects a URL used by any
# non-deleted version of another server).
#
# Runs a dry run by default. Tick "apply" to actually write the edits.

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      server:
        description: "Server name whose versions should be edited"
        required: true
        type: string
        default: "com.smartbear/smartbear-mcp"
      remote_url:
        description: "The remotes[].url to remove"
        required: true
        type: string
        default: "https://swagger.mcp.smartbear.com/mcp"
      versions:
        description: "Comma-separated versions (leave empty to target every version that still has the URL)"
        required: false
        type: string
      apply:
        description: "Apply the edits (unchecked = dry run only)"
        required: false
        type: boolean
        default: false

jobs:
  remove-remote:
    name: Remove remote URL from registry versions
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".tool-versions"

      - name: prepare mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      # Login is only needed to obtain an edit-scoped registry token, which the
      # script reads from ~/.config/mcp-publisher/token.json. Skip it for a dry
      # run so read-only previews don't require secrets.
      - name: Login
        if: ${{ inputs.apply }}
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher login dns --domain smartbear.com --private-key "${{ secrets.GH_MCP_REGISTRY_KEY }}"

      - name: Remove remote URL
        run: |
          node scripts/registry-remove-remote.js \
            --server "${{ inputs.server }}" \
            --remote-url "${{ inputs.remote_url }}" \
            ${{ inputs.versions && format('--versions "{0}"', inputs.versions) || '' }} \
            ${{ inputs.apply && '--apply --yes' || '' }}
