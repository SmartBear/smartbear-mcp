name: Pact Contract Tests

on:
  push:
    branches: [main, integration/*]
  pull_request:
    branches: [main, integration/*]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_COLOR: '1'
  CLICOLOR: '1'
  STABLE_NODE_VERSION: '22'

jobs:
  consumer-tests:
    name: Generate & publish pact contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js ${{ env.STABLE_NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.STABLE_NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pact consumer tests
        run: npm run test:pact

      - name: Install pact CLI tools
        run: ./scripts/ci/pact-install-cli

      - name: Publish pacts to PactFlow
        run: ./scripts/ci/pact-publish-consumer-contracts
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

  can-i-deploy:
    name: Can I deploy?
    runs-on: ubuntu-latest
    needs: consumer-tests

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pact CLI tools
        run: ./scripts/ci/pact-install-cli

      - name: Can I deploy? (smartbear-mcp → production)
        run: ./scripts/ci/pact-can-i-deploy
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
