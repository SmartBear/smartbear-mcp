name: Publish

permissions:
  contents: write
  id-token: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v1.0.0)"
        required: true
        type: string
      push_ecr:
        description: "Push Docker image to Amazon ECR"
        required: false
        type: boolean
        default: true
      publish_npm:
        description: "Publish the package to npm"
        required: false
        type: boolean
        default: true
      publish_mcp:
        description: "Publish to the MCP Registry"
        required: false
        type: boolean
        default: true
      publish_mcpb:
        description: "Build and attach .mcpb to the latest GitHub release"
        required: false
        type: boolean
        default: true
  release:
    types: [published]

jobs:
  # Build platform-specific images on native runners
  build-docker:
    name: Build Docker image (${{ matrix.arch }})
    if: github.event_name != 'workflow_dispatch' || inputs.push_ecr
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}
    environment: Production
    outputs:
      version: ${{ steps.extract_version.outputs.VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.ECR_IAM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR private
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        with:
          registries: "709825985650"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: extract_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Docker image to builder stage for ${{ matrix.platform }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: builder
          push: false
          platforms: ${{ matrix.platform }}
          tags: mcp/smartbear:builder-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          load: true

      - name: Run container tests on ${{ matrix.platform }}
        run: |
          docker run --rm mcp/smartbear:builder-${{ matrix.arch }} npm run test:run

      - name: Build, tag, and push platform-specific docker image
        env:
          IMAGE_TAG: ${{ steps.extract_version.outputs.VERSION }}
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          DEST=${{ secrets.ECR_PRIVATE_REGISTRY_URL }}:${IMAGE_TAG}-${{ matrix.arch }}
          GHCR_DEST=ghcr.io/${REPO_LOWER}:${IMAGE_TAG}-${{ matrix.arch }}
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --tag "$DEST" \
            --tag "$GHCR_DEST" \
            --cache-from type=gha,scope=${{ matrix.arch }} \
            --provenance=false \
            --push \
            .

  # Create multi-arch manifest
  create-manifest:
    name: Create multi-arch manifest
    needs: build-docker
    runs-on: ubuntu-24.04
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.ECR_IAM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR private
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        with:
          registries: "709825985650"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: extract_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        env:
          IMAGE_TAG: ${{ steps.extract_version.outputs.VERSION }}
        run: |
          REGISTRY=${{ secrets.ECR_PRIVATE_REGISTRY_URL }}
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          GHCR_REGISTRY=ghcr.io/${REPO_LOWER}

          # Create manifest list combining both architectures
          docker manifest create "${REGISTRY}:${IMAGE_TAG}" \
            --amend "${REGISTRY}:${IMAGE_TAG}-amd64" \
            --amend "${REGISTRY}:${IMAGE_TAG}-arm64"

          # Push the manifest
          docker manifest push "${REGISTRY}:${IMAGE_TAG}"

          # Create manifest list combining both architectures for GHCR
          docker manifest create "${GHCR_REGISTRY}:${IMAGE_TAG}" \
            --amend "${GHCR_REGISTRY}:${IMAGE_TAG}-amd64" \
            --amend "${GHCR_REGISTRY}:${IMAGE_TAG}-arm64"

          # Push the manifest to GHCR
          docker manifest push "${GHCR_REGISTRY}:${IMAGE_TAG}"

          # Create and push 'latest' tag manifest list
          docker manifest create "${GHCR_REGISTRY}:latest" \
            --amend "${GHCR_REGISTRY}:${IMAGE_TAG}-amd64" \
            --amend "${GHCR_REGISTRY}:${IMAGE_TAG}-arm64"

          docker manifest push "${GHCR_REGISTRY}:latest"

  publish:
    name: Publish package
    needs: [build-docker, create-manifest]
    if: |
      always() &&
      (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped') &&
      (needs.create-manifest.result == 'success' || needs.create-manifest.result == 'skipped')
    runs-on: ubuntu-24.04
    environment: Production
    env:
      RUN_PUBLISH_NPM: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_npm }}
      RUN_PUBLISH_MCP: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_mcp }}
      RUN_PUBLISH_MCPB: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_mcpb }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          scope: '@smartbear'

      - name: Resolve release tag
        id: get_tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [[ -z "$TAG" ]]; then
            echo "::error::No release tag found"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Extract version from package.json
        id: extract_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package.json version
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          EXPECTED_TAG="v${VERSION}"
          if [[ "$TAG" != "$EXPECTED_TAG" ]]; then
            echo "::error::Tag $TAG does not match package.json version $VERSION (expected $EXPECTED_TAG)"
            exit 1
          fi

      - name: Update server.json version
        run: |
          jq --arg v "${{ steps.extract_version.outputs.VERSION }}" \
            '.version = $v | .packages[0].version = $v' \
            server.json > server.json.tmp && mv server.json.tmp server.json

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        if: ${{ env.RUN_PUBLISH_NPM == 'true' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: prepare mcp-publisher
        if: ${{ env.RUN_PUBLISH_MCP == 'true' }}
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Login
        if: ${{ env.RUN_PUBLISH_MCP == 'true' }}
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher login dns --domain smartbear.com --private-key "${{ secrets.GH_MCP_REGISTRY_KEY }}"

      - name: Publish to MCP Registry
        if: ${{ env.RUN_PUBLISH_MCP == 'true' }}
        run: ./mcp-publisher publish

      - name: Build and pack .mcpb
        if: ${{ env.RUN_PUBLISH_MCPB == 'true' }}
        id: pack
        run: |
          npm pack
          MCPB_FILE=$(ls smartbear-mcp-*.mcpb 2>/dev/null)
          if [[ -z "$MCPB_FILE" ]]; then
            echo "::error::No smartbear-mcp-*.mcpb file found after pack"
            exit 1
          fi
          echo "mcpb_file=$MCPB_FILE" >> "$GITHUB_OUTPUT"
      - name: Create/Update GitHub Release
        if: ${{ env.RUN_PUBLISH_MCPB == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          NOTES=$(awk -v ver="$VERSION" '/^## \[/{if(found) exit; if($0 ~ "## \\[" ver "\\]") found=1; next} found' CHANGELOG.md)
          if [[ -z "$NOTES" ]]; then
            echo "::error::No release notes found in CHANGELOG.md"
            exit 1
          fi
          if gh release view "${{ steps.get_tag.outputs.tag }}" &>/dev/null; then
            echo "::notice::Updating release ${{ steps.get_tag.outputs.tag }}"
            gh release edit "${{ steps.get_tag.outputs.tag }}" \
            --notes "$NOTES"
            else
            echo "::notice::Creating release ${{ steps.get_tag.outputs.tag }}"
            gh release create "${{ steps.get_tag.outputs.tag }}" \
              --title "${{ steps.get_tag.outputs.tag }}" \
              --notes "$NOTES"
          fi
          gh release upload "${{ steps.get_tag.outputs.tag }}" \
            "${{ steps.pack.outputs.mcpb_file }}" \
            --clobber
